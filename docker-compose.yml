services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: WebCrawler-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "WebCrawller123!"
      MSSQL_PID: "Express"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
